<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            height: 600px;
            width: 900px;
            background-color: yellow;
            display: grid;
            grid-template-columns: 1fr 3fr 5fr;
            grid-template-rows: 6fr 3fr 5fr;
            row-gap: 10px;
            column-gap: 10px;
        }
        .box{
            background-color: aqua;
            height: auto;
            width: auto;
        }
        #box1{
            background-color: red;
            grid-column: 1/5;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box1"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
