<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Application Form</h1>
    <form action="">
        <input type="text" name="username" placeholder="Username"><br><br>
        <input type="password" name="password" placeholder="Password"><br><br>
        <input type="email" name="email" placeholder="Email"><br><br>
        <label for="phone">Phone Number:</label><br><br>
        <input type="tel" name="phone" placeholder="Phone Number"><br><br>
        <label for="dob">Date of Birth:</label><br><br>
        <input type="date" name="dob" max="2011-01-01" min="1965-01-01"><br><br>

        <p>Choose Services that you want</p>
        <input type="checkbox" id="service1" name="service1">
        <label for="service1">Hostel</label><br>

        <input type="checkbox" id="service2" name="service2">
        <label for="service2">Mess</label><br>

        <input type="checkbox" id="service3" name="service3">
        <label for="service3">Bus Transport</label><br><br>


        <p>choose your gender</p><br>

        <input type="radio" id="male" name="gender">
        <label  for="male">Male</label>
        

         <input type="radio" id="Female" name="gender">
        <label  for="Female">Female</label>
        
        <input type="radio" id="others" name="gender">
        <Label for="others">others</Label><br><br>


        <Label for="file">Upload File</Label>
        <input type="file" name="file" id="file">
        
        <br><br>
        
        <button type="submit">Submit</button>
    </form>
</body>
</html>
