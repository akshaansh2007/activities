<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            height: 1000px;
            width: 1200px;
            border: 10px solid darkorange;
            display: grid;
            padding: 50px;
            grid-template-columns: 1fr 1fr 1fr;
        }
        .box{
            
            border: 10px solid black;
            
        }
        #box1{
            border-color: violet;
            grid-column: 1/4;
            
        }
        #box2{
            
            border-color: green;
            grid-row: 2/4;
        }
        #box3{
            margin-left: 10px;
            margin-right: 10px;
            row-gap: 0px;
            border-color: blue;
            grid-row: 2/3;
        }
        #box4{
            margin-left: 10px;
            margin-right: 10px;
            border-color: blue;
            grid-column: 2/3;
        }
        #box5{
            border-color: black;
            grid-row: 2/4;
        }


    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box1"></div>
        <div class="box" id="box2"></div>
        <div class="box" id="box3"></div>
        <div class="box" id="box4"></div>
        <div class="box" id="box5"></div>
    </div>
</body>
</html>
