<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .earth {
            width: 100px;
            height: 100px;
            border: 5px solid whitesmoke;
            background-color: rgb(130, 130, 238);
            border-radius: 50%;
            position: relative;
        }

        .orbit{
            width: 300px;
            height: 300px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotate 5s linear infinite;

            
        }
        .moon{
            width: 40px;
            height: 40px;
            background-color: whitesmoke;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%);

        }
        @keyframes rotate {
            0%{
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100%{
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
    </style>
</head>
<body>
        <div class="earth">
            <div class="orbit">
            <div class="moon"></div>
            </div>
        </div>
</body>
</html>
