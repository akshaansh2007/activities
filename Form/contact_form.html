<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Contact Us</h1>
    <form action="">
        <label for="name">Name :</label>
        <input type="text" name="name" id="name" placeholder="Your Name"><br><br>
        <label for="email">Email :</label>
        <input type="email" name="email" id="email" placeholder="Your Email"><br><br>
        <label for="pnumber">Phone Number :</label>
        <input type="tel" name="pnumber" id="pnumber" placeholder="Your Phone Number"><br><br>
        <label for="subject">Subject :</label>
        <input type="text" name="subject" id="subject" placeholder="Subject"><br><br>
        <label for="message">Message :</label><br>
        <textarea name="message" id="message" cols="30" rows="10" placeholder="Your Message"></textarea><br><br>
        <label for="sub">Subscribe to Newsletter :</label>
        <input type="checkbox" name="sub" id="sub"><br><br>
        <input type="submit" value="Submit">
        
        

    </form>
</body>
</html>
