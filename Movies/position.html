<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .a{
            height: 900px;
            width: 900px;
            background-color: grey;
            position: relative;
        }
        .b{
            height: 100px;
            width: 100px;
            background-color: red;
            position: relative;
            
        }
        .c{
            height: 100px;
            width: 100px;
            background-color: blue;
            position: absolute;
            left:0;
        }
        .e{
            height: 100px;
            width: 100px;
            background-color: lime;
            position: absolute;
            left:0;
            bottom: 0;
        }
        .d{
            height: 100px;
            width: 100px;
            background-color: yellow;
            position: absolute;
            right:0;
            
        }
    </style>
</head>
<body>
    <div class="a">
        <dov class="b"></dov>
        <dov class="c"></dov>
        <dov class="e"></dov>
        <dov class="d"></dov>
    </div>
</body>
</html>
